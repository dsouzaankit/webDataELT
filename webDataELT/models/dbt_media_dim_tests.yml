version: 2

unit_tests:
  - name: dbt_media_dim_includes_source_when_target_empty
    description: >
      When target dbt_media_dim is empty and dbt_src_media_dim has rows,
      dbt_media_dim should bootstrap by loading source rows with current flags.
    model: dbt_media_dim
    given:
      - input: source('duckdb_src', 'dbt_media_dim')
        rows: []
      - input: ref('dbt_src_media_dim')
        format: sql
        rows: |
          select
            '903'::varchar as author_id,
            '103'::varchar as media_id,
            '240'::varchar as media_duration,
            '{"id":"103","duration":240}'::varchar as media_blob,
            1::integer as seen_count,
            timestamp '2025-04-15 10:00:00' as valid_from_ts,
            null::timestamp as valid_to_ts,
            true::boolean as is_current,
            timestamp '2025-04-16 00:00:00' as extract_ts,
            md5(media_blob) as checksum
    expect:
      rows:
        - author_id: '903'
          media_id: '103'
          media_duration: '240'
          media_blob: '{"id":"103","duration":240}'
          seen_count: 1
          valid_from_ts: '2025-04-15 10:00:00'
          valid_to_ts: null
          extract_ts: '2025-04-16 00:00:00'
          is_deleted: false
          is_current: true
          checksum: 406bfcd69dc2ec1871fbcd692d186261

  - name: dbt_media_dim_recalculates_history_for_matching_newer_source
    description: >
      When source has a newer valid_from_ts for the same author_id/media_id/checksum
      and the target still holds the older timestamp, both rows enter matching +
      new_batch, are merged in `recalculated`, the older version is closed, and
      the newer source row is current.
    model: dbt_media_dim
    given:
      - input: source('duckdb_src', 'dbt_media_dim')
        rows:
          - author_id: '904'
            media_id: '104'
            media_duration: '120'
            media_blob: '{"id":"104","duration":120}'
            seen_count: 1
            valid_from_ts: '2025-04-01 08:00:00'
            valid_to_ts: null
            is_current: true
            extract_ts: '2025-04-01 09:00:00'
            is_deleted: false
            checksum: 239ff012bbfbe62eb0bc672245d79894
      - input: ref('dbt_src_media_dim')
        format: sql
        rows: |
          select
            '904'::varchar as author_id,
            '104'::varchar as media_id,
            '120'::varchar as media_duration,
            '{"id":"104","duration":120}'::varchar as media_blob,
            1::integer as seen_count,
            timestamp '2025-04-15 10:00:00' as valid_from_ts,
            null::timestamp as valid_to_ts,
            true::boolean as is_current,
            timestamp '2025-04-16 00:00:00' as extract_ts,
            md5(media_blob) as checksum
    expect:
      rows:
        - author_id: '904'
          media_id: '104'
          media_duration: '120'
          media_blob: '{"id":"104","duration":120}'
          seen_count: 1
          valid_from_ts: '2025-04-01 08:00:00'
          valid_to_ts: '2025-04-15 10:00:00'
          extract_ts: '2025-04-01 09:00:00'
          is_deleted: false
          is_current: false
          checksum: 239ff012bbfbe62eb0bc672245d79894
        - author_id: '904'
          media_id: '104'
          media_duration: '120'
          media_blob: '{"id":"104","duration":120}'
          seen_count: 2
          valid_from_ts: '2025-04-15 10:00:00'
          valid_to_ts: null
          extract_ts: '2025-04-16 00:00:00'
          is_deleted: false
          is_current: true
          checksum: 239ff012bbfbe62eb0bc672245d79894

  - name: dbt_media_dim_keeps_target_and_adds_source_when_no_key_match
    description: >
      When target and source are both non-empty but there is no author_id/media_id
      match, the existing target row should remain unchanged and the source row
      should be added as a new current row.
    model: dbt_media_dim
    given:
      - input: source('duckdb_src', 'dbt_media_dim')
        rows:
          - author_id: '905'
            media_id: '105'
            media_duration: '90'
            media_blob: '{"id":"105","duration":90}'
            seen_count: 1
            valid_from_ts: '2025-04-01 08:00:00'
            valid_to_ts: null
            is_current: true
            extract_ts: '2025-04-01 09:00:00'
            is_deleted: false
            checksum: 67d8b793ff15b7c8371f9b0994ab2af1
      - input: ref('dbt_src_media_dim')
        format: sql
        rows: |
          select
            '906'::varchar as author_id,
            '106'::varchar as media_id,
            '150'::varchar as media_duration,
            '{"id":"106","duration":150}'::varchar as media_blob,
            1::integer as seen_count,
            timestamp '2025-04-15 10:00:00' as valid_from_ts,
            null::timestamp as valid_to_ts,
            true::boolean as is_current,
            timestamp '2025-04-16 00:00:00' as extract_ts,
            md5(media_blob) as checksum
    expect:
      rows:
        - author_id: '905'
          media_id: '105'
          media_duration: '90'
          media_blob: '{"id":"105","duration":90}'
          seen_count: 1
          valid_from_ts: '2025-04-01 08:00:00'
          valid_to_ts: null
          extract_ts: '2025-04-01 09:00:00'
          is_deleted: false
          is_current: true
          checksum: 67d8b793ff15b7c8371f9b0994ab2af1
        - author_id: '906'
          media_id: '106'
          media_duration: '150'
          media_blob: '{"id":"106","duration":150}'
          seen_count: 1
          valid_from_ts: '2025-04-15 10:00:00'
          valid_to_ts: null
          extract_ts: '2025-04-16 00:00:00'
          is_deleted: false
          is_current: true
          checksum: aa26582e8f0ac68ab4410c6ba577e3a6

  - name: dbt_media_dim_builds_history_from_multiple_source_updates_when_target_empty
    description: >
      When target is empty and source has multiple updates for the same
      author_id/media_id with the same JSON blob, dbt_media_dim should build
      SCD history by valid_from_ts and keep only the newest row current.
    model: dbt_media_dim
    given:
      - input: source('duckdb_src', 'dbt_media_dim')
        rows: []
      - input: ref('dbt_src_media_dim')
        format: sql
        rows: |
          select
            '907'::varchar as author_id,
            '107'::varchar as media_id,
            '100'::varchar as media_duration,
            '{"id":"107","duration":100}'::varchar as media_blob,
            1::integer as seen_count,
            timestamp '2025-04-10 09:00:00' as valid_from_ts,
            null::timestamp as valid_to_ts,
            true::boolean as is_current,
            timestamp '2025-04-16 00:00:00' as extract_ts,
            md5(media_blob) as checksum
          union all
          select
            '907'::varchar,
            '107'::varchar,
            '100'::varchar,
            '{"id":"107","duration":100}'::varchar,
            1::integer,
            timestamp '2025-04-15 10:00:00',
            null::timestamp,
            true::boolean,
            timestamp '2025-04-16 00:00:00',
            md5('{"id":"107","duration":100}'::varchar) as checksum
    expect:
      rows:
        - author_id: '907'
          media_id: '107'
          media_duration: '100'
          media_blob: '{"id":"107","duration":100}'
          seen_count: 1
          valid_from_ts: '2025-04-10 09:00:00'
          valid_to_ts: '2025-04-15 10:00:00'
          extract_ts: '2025-04-16 00:00:00'
          is_deleted: false
          is_current: false
          checksum: d61729e91684495c3a71d297a114e7b2
        - author_id: '907'
          media_id: '107'
          media_duration: '100'
          media_blob: '{"id":"107","duration":100}'
          seen_count: 2
          valid_from_ts: '2025-04-15 10:00:00'
          valid_to_ts: null
          extract_ts: '2025-04-16 00:00:00'
          is_deleted: false
          is_current: true
          checksum: d61729e91684495c3a71d297a114e7b2

  - name: dbt_media_dim_recomputes_history_when_source_is_older_than_matching_target
    description: >
      When target holds a newer valid_from_ts than the source batch for the same
      key/checksum, both the older source row and newer target row are merged in
      `recalculated`: the older row is closed to the newer `valid_from_ts`, and
      the newer target row stays current.
    model: dbt_media_dim
    given:
      - input: source('duckdb_src', 'dbt_media_dim')
        rows:
          - author_id: '908'
            media_id: '108'
            media_duration: '220'
            media_blob: '{"id":"108","duration":220}'
            seen_count: 1
            valid_from_ts: '2025-04-20 12:00:00'
            valid_to_ts: null
            is_current: true
            extract_ts: '2025-04-20 13:00:00'
            is_deleted: false
            checksum: a0edb55a3c0f20c9cc9fcf800feb63cd
      - input: ref('dbt_src_media_dim')
        format: sql
        rows: |
          select
            '908'::varchar as author_id,
            '108'::varchar as media_id,
            '220'::varchar as media_duration,
            '{"id":"108","duration":220}'::varchar as media_blob,
            1::integer as seen_count,
            timestamp '2025-04-10 09:00:00' as valid_from_ts,
            null::timestamp as valid_to_ts,
            true::boolean as is_current,
            timestamp '2025-04-11 00:00:00' as extract_ts,
            md5(media_blob) as checksum
    expect:
      rows:
        - author_id: '908'
          media_id: '108'
          media_duration: '220'
          media_blob: '{"id":"108","duration":220}'
          seen_count: 1
          valid_from_ts: '2025-04-10 09:00:00'
          valid_to_ts: '2025-04-20 12:00:00'
          extract_ts: '2025-04-11 00:00:00'
          is_deleted: false
          is_current: false
          checksum: a0edb55a3c0f20c9cc9fcf800feb63cd
        - author_id: '908'
          media_id: '108'
          media_duration: '220'
          media_blob: '{"id":"108","duration":220}'
          seen_count: 2
          valid_from_ts: '2025-04-20 12:00:00'
          valid_to_ts: null
          extract_ts: '2025-04-20 13:00:00'
          is_deleted: false
          is_current: true
          checksum: a0edb55a3c0f20c9cc9fcf800feb63cd

  - name: dbt_media_dim_marks_target_deleted_when_recent_backfill_omits_it
