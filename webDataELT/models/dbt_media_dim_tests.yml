          union all
          select
            '913'::varchar,
            '113'::varchar,
            '303'::varchar,
            '{"id":"113","duration":303}'::varchar,
            1::integer,
            timestamp '2025-04-15 18:00:00',
            null::timestamp,
            true::boolean,
            timestamp '2025-06-10 09:00:00',
            md5('{"id":"113","duration":303}'::varchar) as checksum
    expect:
      rows:
        - author_id: '911'
          media_id: '111'
          media_duration: '101'
          media_blob: '{"id":"111","duration":101}'
          seen_count: 1
          valid_from_ts: '2025-04-12 09:00:00'
          valid_to_ts: '2025-05-12 09:00:00'
          extract_ts: '2025-04-12 10:00:00'
          is_deleted: true
          is_current: false
          checksum: f9c00117425faee599e49d7728f8ba31
        - author_id: '911'
          media_id: '111'
          media_duration: '101'
          media_blob: '{"id":"111","duration":101}'
          seen_count: 2
          valid_from_ts: '2025-05-12 09:00:00'
          valid_to_ts: null
          extract_ts: '2025-05-12 10:00:00'
          is_deleted: false
          is_current: true
          checksum: f9c00117425faee599e49d7728f8ba31
        - author_id: '912'
          media_id: '112'
          media_duration: '202'
          media_blob: '{"id":"112","duration":202}'
          seen_count: 1
          valid_from_ts: '2025-04-10 08:00:00'
          valid_to_ts: null
          extract_ts: '2025-04-10 09:00:00'
          is_deleted: false
          is_current: true
          checksum: c2ab02dde5046f2524e527d56ffdf359
        - author_id: '913'
          media_id: '113'
          media_duration: '303'
          media_blob: '{"id":"113","duration":303}'
