          - author_id: '911'
            media_id: '111'
            media_duration: '101'
            media_blob: '{"id":"111","duration":101}'
            seen_count: 1
            valid_from_ts: '2025-04-12 09:00:00'
            valid_to_ts: '2025-05-12 09:00:00'
            is_current: false
            extract_ts: '2025-04-12 10:00:00'
            is_deleted: false
            checksum: f9c00117425faee599e49d7728f8ba31
          - author_id: '912'
            media_id: '112'
            media_duration: '202'
            media_blob: '{"id":"112","duration":202}'
            seen_count: 1
            valid_from_ts: '2025-04-10 08:00:00'
            valid_to_ts: null
            is_current: true
            extract_ts: '2025-04-10 09:00:00'
            is_deleted: false
            checksum: c2ab02dde5046f2524e527d56ffdf359
          - author_id: '913'
            media_id: '113'
            media_duration: '303'
            media_blob: '{"id":"113","duration":303}'
            seen_count: 1
            valid_from_ts: '2025-04-15 18:00:00'
            valid_to_ts: null
            is_current: true
            extract_ts: '2025-04-15 20:00:00'
            is_deleted: false
            checksum: 206681f332b01c31381a60d7b8b4f008
      - input: ref('dbt_src_media_dim')
        format: sql
        rows: |
          select
            '912'::varchar as author_id,
            '112'::varchar as media_id,
            '202'::varchar as media_duration,
            '{"id":"112","duration":202}'::varchar as media_blob,
            1::integer as seen_count,
            timestamp '2025-04-10 08:00:00' as valid_from_ts,
