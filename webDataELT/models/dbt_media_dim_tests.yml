  - name: dbt_media_dim_reactivates_deleted_inactive_when_key_reappears_in_source
    description: >
      Non-deleted target rows that join to source on (key, checksum, valid_from_ts)
      stay in `retained` unchanged. A deleted sibling row for the same key does not
      enter `retained`; it is merged with the matching source row in `recalculated`,
      clearing `is_deleted`. Windowing orders by `valid_from_ts`, `extract_ts`, so
      the April version is `seen_count` 1, gets `valid_to_ts` from the next version
      (`lead`), `extract_ts` from `max_extract_ts`, and `is_current` false. The May
      row remains in `retained` as current.
    model: dbt_media_dim
    given:
      - input: source('duckdb_src', 'dbt_media_dim')
        rows:
          - author_id: '917'
            media_id: '117'
            media_duration: '111'
            media_blob: '{"id":"117","duration":111}'
            seen_count: 2
            valid_from_ts: '2025-05-01 08:00:00'
            valid_to_ts: null
            is_current: true
            extract_ts: '2025-05-01 09:00:00'
            is_deleted: false
            checksum: 9cc059ca6cc8d6bceca450e2610f2ac5
          - author_id: '917'
            media_id: '117'
            media_duration: '111'
            media_blob: '{"id":"117","duration":111}'
            seen_count: 1
            valid_from_ts: '2025-04-01 08:00:00'
            valid_to_ts: '2025-05-01 08:00:00'
            is_current: false
            extract_ts: '2025-06-10 08:00:00'
            is_deleted: true
            checksum: 9cc059ca6cc8d6bceca450e2610f2ac5
      - input: ref('dbt_src_media_dim')
        format: sql
        rows: |
          select
            '917'::varchar as author_id,
            '117'::varchar as media_id,
            '111'::varchar as media_duration,
            '{"id":"117","duration":111}'::varchar as media_blob,
            1::integer as seen_count,
            timestamp '2025-04-01 08:00:00' as valid_from_ts,
            null::timestamp as valid_to_ts,
            true::boolean as is_current,
            timestamp '2025-07-10 09:00:00' as extract_ts,
            md5(media_blob) as checksum
          union all
          select
            '917'::varchar,
            '117'::varchar,
            '111'::varchar,
            '{"id":"117","duration":111}'::varchar,
            1::integer,
            timestamp '2025-05-01 08:00:00',
            null::timestamp,
            true::boolean,
            timestamp '2025-07-10 09:00:00',
            md5('{"id":"117","duration":111}'::varchar) as checksum
    expect:
      rows:
        - author_id: '917'
          media_id: '117'
          media_duration: '111'
          media_blob: '{"id":"117","duration":111}'
          seen_count: 1
          valid_from_ts: '2025-04-01 08:00:00'
          valid_to_ts: '2025-04-01 08:00:00'
          extract_ts: '2025-07-10 09:00:00'
          is_deleted: false
          is_current: false
          checksum: 9cc059ca6cc8d6bceca450e2610f2ac5
        - author_id: '917'
          media_id: '117'
          media_duration: '111'
          media_blob: '{"id":"117","duration":111}'
          seen_count: 2
          valid_from_ts: '2025-05-01 08:00:00'
          valid_to_ts: null
          extract_ts: '2025-05-01 09:00:00'
          is_deleted: false
          is_current: true
          checksum: 9cc059ca6cc8d6bceca450e2610f2ac5

  # --- Differing checksum (different media_blob / md5(media_blob)) vs same-checksum tests above ---

  - name: dbt_media_dim_recalculates_history_for_matching_newer_source_differing_checksum
    description: >
      Same author_id/media_id but source sends a different JSON blob (new checksum).
